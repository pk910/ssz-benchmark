name: Daily Scheduled Benchmarks

on:
  workflow_dispatch:
    inputs:
      server_type:
        description: 'Hetzner server type (dedicated vCPU recommended)'
        default: 'ccx23'
        type: choice
        options:
          - ccx23
          - ccx13
      location:
        description: 'Hetzner location'
        default: 'fsn1'
  schedule:
    # Run twice daily
    - cron: '30 2,14 * * *'

permissions:
  contents: write

# Never run two benchmark jobs at once: they would compete for the same
# benchmark-results branch and spin up redundant servers.
concurrency:
  group: daily-benchmarks
  cancel-in-progress: false

jobs:
  store-results:
    runs-on: ubuntu-latest
    # Bounds the run well above a normal ~50 min execution. On timeout the
    # teardown step (if: always()) still runs, and the reaper (90 min) is the
    # backstop for a hard-killed runner.
    timeout-minutes: 80

    env:
      SERVER_NAME: ssz-bench-${{ github.run_id }}-${{ github.run_attempt }}
      SERVER_TYPE: ${{ inputs.server_type || 'ccx23' }}
      LOCATION: ${{ inputs.location || 'fsn1' }}
      SERVER_IMAGE: ubuntu-24.04
      # Benchmarks run on a dedicated-vCPU box and take more samples than the old
      # shared-runner setup. CPU pinning (BENCH_CPUS) is auto-derived per box in
      # remote-bench.sh (single core; see the pinning note there).
      BENCH_COUNT: '10'
      GO_VERSION: '1.25.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate ephemeral SSH key
        run: |
          ssh-keygen -t ed25519 -N '' -f /tmp/bench_key -C "$SERVER_NAME"
          echo "SSH_PUBLIC_KEY=$(cat /tmp/bench_key.pub)" >> "$GITHUB_ENV"

      - name: Provision Hetzner benchmark server
        id: provision
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: ./scripts/hetzner/provision.sh

      - name: Get workflow timestamp
        id: timestamp
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Run benchmarks on remote server
        env:
          SERVER_IP: ${{ steps.provision.outputs.ip }}
        run: ./scripts/hetzner/run-remote.sh

      - name: Tear down Hetzner benchmark server
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: ./scripts/hetzner/teardown.sh

      - name: Process results (stable versions)
        run: |
          cp bench-output/stable/*_results.txt .
          ./scripts/store-results.sh --skip-run --timestamp ${{ steps.timestamp.outputs.ts }}

      - name: Process results (dev versions)
        run: |
          # The dev phase is best-effort on the remote, so dev results may be
          # absent; skip processing gracefully when they are.
          if ls bench-output/dev/*_results.txt >/dev/null 2>&1; then
            cp bench-output/dev/*_results.txt .
            # Overlay the dev go.mod files so version extraction reads the
            # pseudo-versions that were actually benchmarked on the remote.
            for f in bench-output/dev/gomod/*.mod; do
              lib="$(basename "$f" .mod)"
              cp "$f" "benchmarks/$lib/go.mod"
            done
            ./scripts/store-results.sh --dev --skip-run --timestamp ${{ steps.timestamp.outputs.ts }}
            # Restore the stable go.mod files before committing.
            git checkout -- benchmarks
          else
            echo "No dev results present; skipping dev processing"
          fi

      - name: Push results to benchmark-results branch
        run: ./scripts/push-results.sh
